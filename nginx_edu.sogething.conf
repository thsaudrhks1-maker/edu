# ===================================================================
# Nginx 설정 파일 - EDU Service (edu.sogething.com)
# ===================================================================
# 배포 경로: /etc/nginx/sites-available/edu.sogething
# 활성화: /etc/nginx/sites-enabled/edu.sogething (심볼릭 링크)
# ===================================================================

# WebSocket Upgrade Map
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# ===================================================================
# HTTP → HTTPS 리다이렉트 (포트 80)
# ===================================================================
server {
    listen 80;
    server_name edu.sogething.com;

    return 301 https://$host$request_uri;
}

# ===================================================================
# HTTPS 서버 블록 (포트 443) - EDU 메인
# ===================================================================
server {
    listen 443 ssl http2;
    server_name edu.sogething.com;

    # SSL 인증서 설정 (Let's Encrypt - edu.sogething.com 용으로 교체 필요)
    ssl_certificate /etc/letsencrypt/live/edu.sogething.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edu.sogething.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 프론트엔드 (React/Vite) - Port 3700
    location / {
        proxy_pass http://localhost:3700;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 백엔드 API (FastAPI) - Port 8700
    location /api/ {
        proxy_pass http://localhost:8700;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 업로드 파일 서빙
    location /uploads/ {
        proxy_pass http://localhost:8700;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # API 문서
    location /docs {
        proxy_pass http://localhost:8700;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://localhost:8700;
        proxy_set_header Host $host;
    }

    access_log /var/log/nginx/edu.sogething.access.log;
    error_log /var/log/nginx/edu.sogething.error.log warn;
}
